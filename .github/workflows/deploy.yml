# STEP 12: Configure CI/CD
# This workflow runs on every push to main branch
# It tests the app and deploys to AWS EC2

name: CI/CD Pipeline — Data Migration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── CI: Test ────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: theo
          POSTGRES_PASSWORD: "1234"
          POSTGRES_DB: mydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run Prisma migration
        run: |
          cd backend
          npx prisma db push
        env:
          DATABASE_URL: postgresql://theo:1234@localhost:5432/mydb

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # ─── CD: Deploy to AWS EC2 ───────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd /home/ubuntu/nodejs-react
            git pull origin main
            cd backend
            npm install
            npx prisma db push
            pm2 restart backend || pm2 start src/index.js --name backend
            cd ../frontend
            npm install
            npm run build
            echo "✅ Deployment complete!"
